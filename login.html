<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Eleos</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="login-container">
    <div class="login-bg">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
    </div>
    
    <div class="login-card">
      <div class="login-logo">Eleos</div>
      <h2 class="login-title">Welcome back</h2>
      <p class="login-subtitle">Sign in to continue your journey</p>
      
      <div id="error-msg" class="error-msg"></div>
      
      <form id="auth-form">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit" class="login-btn" id="submit-btn">Sign In</button>
      </form>
      
      <div class="login-toggle">
        <span id="toggle-text">Don't have an account?</span>
        <a href="#" id="toggle-link">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
